<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Flip Calculator</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
h1 { text-align: center; }
input, select, button { width: 100%; padding: 8px; margin: 6px 0; }
button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
.output { background: white; padding: 15px; margin-top: 10px; border-radius: 8px; }
</style>
</head>
<body>

<h1>Car Flip Calculator</h1>

<label>Make / Model:</label>
<input type="text" id="makeModel" placeholder="e.g., NP200" list="carList">
<datalist id="carList">
  <option value="Toyota Hilux">
  <option value="Toyota Corolla">
  <option value="Nissan NP200">
  <option value="Volkswagen Polo Vivo">
  <option value="Ford Ranger">
</datalist>

<label>Year:</label>
<input type="number" id="year" placeholder="e.g., 2021">

<label>Mileage (km):</label>
<input type="number" id="mileage" placeholder="e.g., 190000">

<label>Condition:</label>
<select id="condition">
  <option value="excellent">Excellent</option>
  <option value="good">Good</option>
  <option value="average">Average</option>
  <option value="rough">Rough</option>
</select>

<label>Recon / Repair Cost (R):</label>
<input type="number" id="recon" placeholder="e.g., 5000">

<label>Profit Target (R):</label>
<input type="number" id="profitTarget" placeholder="e.g., 15000">

<label>Notes (optional):</label>
<input type="text" id="notes" placeholder="Any notes for this car">

<button onclick="calculatePrices()">Calculate</button>

<div class="output" id="output"></div>

<script>
function calculatePrices() {
  let makeModel = document.getElementById('makeModel').value;
  let year = parseInt(document.getElementById('year').value) || 2021;
  let mileage = parseInt(document.getElementById('mileage').value) || 0;
  let condition = document.getElementById('condition').value;
  let recon = parseInt(document.getElementById('recon').value) || 0;
  let profitTarget = parseInt(document.getElementById('profitTarget').value) || 15000;

  // Base retail and trade values
  let baseRetail = 150000 - ((2026 - year) * 10000);
  let baseTrade = baseRetail * 0.75;

  // Mileage penalty
  if(mileage > 150000){
    baseTrade -= (mileage - 150000) * 0.1;
    baseRetail -= (mileage - 150000) * 0.08;
  }

  // Condition adjustment
  const conditionAdjust = { 'excellent': 1.05, 'good': 1.0, 'average': 0.95, 'rough': 0.9 };
  baseTrade *= conditionAdjust[condition];
  baseRetail *= conditionAdjust[condition];

  // Deduct recon cost
  baseTrade -= recon;
  baseRetail -= recon;

  // Suggested offer
  let suggestedOffer = baseTrade + profitTarget;

  // High/Low seller indicator
  const highSellerModels = ['Toyota Hilux', 'Nissan NP200', 'Volkswagen Polo Vivo', 'Ford Ranger'];
  let sellerIndicator = highSellerModels.includes(makeModel) ? 'High Seller' : 'Low Seller';

  document.getElementById('output').innerHTML = `
    <b>Trade Value:</b> R${Math.round(baseTrade)}<br>
    <b>Retail Value:</b> R${Math.round(baseRetail)}<br>
    <b>Suggested Offer:</b> R${Math.round(suggestedOffer)}<br>
    <b>Safe Buy Price:</b> R${Math.round(baseTrade + (profitTarget/2))}<br>
    <b>Estimated Profit:</b> R${Math.round(suggestedOffer - baseTrade)}<br>
    <b>Market Demand:</b> ${sellerIndicator}
  `;
}
</script>

</body>
</html>
